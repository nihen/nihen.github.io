# PCE 準備金のグローバルプール化

- **対象読者**: ガバナンス投票者（非エンジニア）
- **目的**: PCE 準備金の設計原則を明示し、コミュニティごとに分離された準備金をグローバルプールに統合する提案

---

## 0. この文書の要点

- 現状、PCE 準備金は **コミュニティごとに分離**して管理されている
- ARIGATO ミントやコミュニティ間 swap によって「個別コミュニティの準備金」と「実際の claim」がズレていく構造がある
- 提案: 全コミュニティ共通の **グローバル PCE プール**に統合し、swap-back のチェックはプール全体で行う
- 設計原則を明示: 100% 裏付けは保証しない「流動性プール型（fractional reserve）」として運用する

---

## 1. 前提: PCE と Community Token

PCE プロトコルには 3 種類のトークン概念がある。

- **PCE Token**: プロトコル全体の基軸トークン
- **Community Token**: コミュニティごとに発行される地域通貨的トークン
- **PCE BASE Token**: Community Token の裏付け価値（= 最終的に何 PCE と交換できるか）。オンチェーンに実在する ERC20 トークンではなく、swap 計算の中に暗黙的に反映される概念上の値

Community Token は PCE を**ロックして発行**される。PCE を預けると Community Token が返り（swap）、Community Token を戻すと PCE が返ってくる。このロックされた PCE が本提案で扱う **PCE 準備金**。

---

## 2. 現状: コミュニティごとに分離された準備金

Community Token が発行される仕組み:

- ユーザーが PCE を預けると、**PCE 実体は PCEToken コントラクト自体にロック**される（`address(this)` の ERC20 残高として集約）
- ロック金額は会計上 `localTokens[community].depositedPCEToken` でコミュニティごとに追跡される（`getDepositedPCETokens()` で参照可能）
- swap-back 時は、戻そうとする PCE 量がそのコミュニティの会計上の準備金以下でなければ失敗する

つまり物理的には既に PCE は単一アドレスに集約されているが、**会計上はコミュニティごとに分離**されており、各コミュニティは自分の会計準備金を超えた払い戻しができない構造になっている。

---

## 3. 現状の問題点

コミュニティごとに分離した準備金モデルには、時間経過で以下のズレが発生する。

### 3.1 ARIGATO ミントによる claim の膨張

ARIGATO CREATION は送金のたびに Community Token を追加ミントする。このとき **準備金は増えない**。したがって時間とともに claim 総額が準備金を超えていき、全員が一斉に戻そうとすると一部の swap-back が失敗する状態になる。

### 3.2 コミュニティ間 swap による偏り

ユーザーが Community A から Community B に Community Token を swap すると、raw 供給は A から B に移る。しかし **準備金は移動しない**（A にロックされた PCE はそのまま）。結果として B 側では「受け取った raw に対する準備金の裏付けが不足」する状態が生じる。

### 3.3 PCE 減衰による surplus

PCE は毎週 0.2% 減衰する（年間約 10%）ため、1 claim あたりの PCE 換算価値は時間とともに減る。これは逆に「準備金 > claim」の方向に振れる。

---

## 4. 設計原則をどう決めるか

問題を整理すると、「PCE 準備金は何を保証するのか」という設計原則が曖昧なまま実装が動いている状態にある。考えられる立場は 3 つ。

| 立場 | 意味 | 含意 |
|---|---|---|
| **A. 100% 裏付け保証** | 全 Community Token が PCE に 1:1 で戻せる | ARIGATO ミントは PCE の追加調達が必要になる |
| **B. 流動性プール** | 日常的な swap 需要をさばける程度の流動性があれば OK | 一斉引き出しは想定しない、fractional reserve |
| **C. 初期出資** | コミュニティ立ち上げの stake のみ、ARIGATO は seigniorage 扱い | 現状に近い、claim > 準備金を容認 |

### 本提案の立場: B 流動性プール

- 100% 裏付けは技術的にも経済的にも過剰（ARIGATO は使えば使うほどミントされるので 1:1 を維持するコストが高い）
- 一方で「無保証」のまま放置するのは Community Token の信用を損なう
- 日常的な swap 需要を満たす流動性を確保しつつ、**一斉引き出しは日次 swap 上限で抑制、究極的には早い者勝ちで保証しない**、という立場を明示する

---

## 5. 具体的に何を変えるか

### 5.1 グローバル PCE プールへの統合

本質は「物理的なプール化」ではなく **会計チェックの撤廃**。前述のとおり PCE は既に PCEToken コントラクトの単一 ERC20 残高として物理的に集約されている。本提案で変えるのは:

- swap-back の可否判定を、コミュニティ別の会計 (`localTokens[community].depositedPCEToken`) から、**コントラクト全体の PCE 残高 (`balanceOf(address(this))`)** に切り替える
- コミュニティ別の増減計算（減算・加算・初期値の全書き込み）を停止し、フィールドを**移行時点のスナップショットとして凍結**する

`balanceOf(address(this))` 基準にすると、プロトコル外から PCEToken アドレスへ直接 PCE を送金した場合もプール残高としてカウントされる。これはガバナンスやプロトコル収益からの**補填フローを公式に組み込める**という副作用になる（本提案で意図する挙動）。

### 5.2 コミュニティ間 swap の簡素化

- `swapTokens`（Community A → B）での準備金移動を気にする必要がなくなる
- raw 供給だけが移動し、準備金は全体で共有されているので、偏りが発生しない

### 5.3 日次 swap 上限の扱い

現状の日次 swap 上限（`swappedToPCEToday` 等）は **各 Community Token インスタンス単位** で管理されている。プロトコル全体のスロットリングは現行コードには存在しない。

- 本提案では日次上限の設計自体は変更しない（スコープ外）
- ただしグローバルプール化と整合させて**プロトコル全体のスロットリング**を導入するなら、`PCEToken` 側に全体カウンタと setter を新設する別設計が必要になる
- 現行変数 `swapableToPCERate` / `swapableToPCEIndividualRate` には setter が無いため、ガバナンスで値を動かすには setter 追加も前提になる

### この提案で保証すること／しないこと

**保証すること**

- swap-back の成否が、個別コミュニティの会計準備金ではなく**プロトコル全体のプール残高**で決まる
- コミュニティ間 swap で準備金の会計上の偏りが発生しない

**保証しないこと**

- すべての swap-back が必ず成功すること（プール枯渇時は失敗する）
- Community Token 全体に対する 100% の PCE 裏付け
- プール残量が逼迫した際の優先順位（究極は早い者勝ち）
- **コミュニティ間のクロスサブシディが生じないこと**（PCE を多く預けたコミュニティの準備金が、他コミュニティの swap-back に使われうる）

つまり、「信用できる流動性プールは用意するが、急激な引き出しや ARIGATO 累積によるプール消費・コミュニティ間の相互補助までは保証しない」というのが本提案の立場。

---

## 6. 影響範囲

### 変わること

- swap-back の失敗条件が「個別コミュニティの準備金不足」から「グローバルプールの不足」に変わる
- コミュニティ間 swap (`swapTokens`) が準備金の観点で単純化される
- `localTokens[community].depositedPCEToken` は swap 成否判定から外れ、書き込みも停止してスナップショットとして凍結される

### 変わらないこと

- 通常の送金、transfer、ARIGATO ミント、Community Token の減衰など基本操作は維持される
- 各コミュニティの raw / display 残高の見え方
- PCE Token 直接保有者への影響はない
- コミュニティ作成時に PCE を `address(this)` にロックする流れ自体

### 実装面の留意点

- **ストレージレイアウト**: `Utils.LocalToken` の `depositedPCEToken` フィールドは UUPS プロキシ互換性のため**物理削除不可**、残置必須
- **書き込み全停止**: `swapFromLocalToken` の `-=`、`swapToLocalToken` の `+=`、`createToken` の初期値設定を**すべて停止**。Underflow revert の回避と「片方向の会計」になるのを防ぐ
- **ABI 互換**: `getDepositedPCETokens()` など既存ゲッターは維持。返す値は「移行時点の凍結スナップショット」になる

---

## 7. ガバナンスで決めるべきこと

1. **プール逼迫時のサーキットブレーカー**
   - 残高が一定閾値を下回った時点で日次上限を自動的に引き下げる設計を入れるか
   - ガバナンス介入を発動する閾値
2. **プール補填の公式フロー**
   - プロトコル収益や外部流動性提供からの PCE 注入を公式オペレーションに組み込むか
3. **Setter の同時追加**
   - 現行 `swapableToPCERate` / `swapableToPCEIndividualRate` には setter が無い
   - 本提案のアップグレードに合わせ setter（＋イベント）追加を推奨。サーキットブレーカー機動性のため必須
4. **日次 swap 上限の扱い**
   - 現状はコミュニティ単位。プロトコル全体スロットリングを導入するか、別 PIP で扱うか
5. **テスト観点**
   - 複数コミュニティ同時 swap の整合性
   - ARIGATO 累積 × swap-back の連鎖負荷
   - 既存残高からの移行整合性

---

## 8. ARIGATO 中立化提案との関係

本提案と並行して検討している「ARIGATO CREATION のコミュニティ間中立化」は、ARIGATO の日次ミント上限（`maxIncreaseOfTotalSupplyBp`）を全コミュニティ共通のガバナンス管理値にする提案。

- 本提案（グローバルプール化）を進めると、**ARIGATO ミントのペースはプール枯渇に直結する**
- したがって ARIGATO の bp をガバナンスで一元管理する必然性はむしろ**増す**
- 2 つは独立に成立するが、**両方同時に導入すると整合的で、運用の見通しが良くなる**
